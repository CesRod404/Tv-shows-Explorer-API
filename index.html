<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Shows Explorer</title>
    <meta name="description" content="Explora tus series de televisión favoritas, descubre nuevos lanzamientos y revisa la programación con TV Shows Explorer.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="images/television.png" type="image/x-icon">
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <h1 class="logo">TVShows<span>Explorer</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" id="home-link" class="active">Inicio</a></li>
                    <li><a href="#" id="schedule-link">Programación</a></li>
                </ul>
            </nav>
            <form id="search-form" class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar series..." required>
                <button type="submit" id="search-btn">Buscar</button>
            </form>
        </div>
    </header>

    <main class="container">
        <!-- Spinner de carga -->
        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
        </div>
        
        <!-- Contenido principal -->
        <div id="main-content" class="grid-container">
            <!-- Dynamic content loaded here -->
        </div>

        <!-- Modal para detalles de la serie -->
        <div id="show-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-modal" class="close-btn">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 TV Shows Explorer. Desarrollado con ❤️.</p>
            <p>Datos proporcionados por <a href="https://www.tvmaze.com/api" target="_blank">TVMaze API</a>.</p>
        </div>
    </footer>

    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
